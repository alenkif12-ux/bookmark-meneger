<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="topbar">
            <div class="topbar_bar">
                <input type="text" placeholder="Search...">
            </div>
            <div class="topbar_actions">
                <button class="button topbar_button">Add bookmark</button>
                <img src="https://placehold.co/40" class="avatar">
            </div>
        </header>
        <main class="main">
            <ul class="bookmarks">
                <li>
                    <article class="bookmark">
                        <header class="bookmark_header">
                            <div class="borkmark_content">
                                <img src="https://placehold.co/44" class="bookmark_logo">
                                <div>
                                    <h2 class="bookmark_title">Frontend Mentor</h2>
                                    <p class="bookmark_link">frontendmentor.io</p>
                                </div>
                            </div>
                                <button>
                                    <img src="images/Icon.svg">
                                </button>
                        </header>
                        
                        <div class="bookmark_body">
                            <p  class="bookmark_desc">Improve your front-end coding skills by building real projects. Solve real-world HTML, CSS and JavaScript challenges whilst working to professional designs.</p>
                        <ul class="bookmark_tags">
                            <li class="tag">
                                Practice
                            </li>
                            <li class="tag">
                                Learning
                            </li>
                            <li class="tag">
                                Community
                            </li>
                        </ul>
                        </div>
                        <footer >
                            <ul class="bookmark_footer">
                                <li class="footer_item">
                                    <img src="images/eye.svg">
                                    <span>47</span>
                                </li>
                                <li class="footer_item">
                                    <img src="images/clock.svg">
                                    <span>23 Sept</span>
                                </li>
                                <li class="footer_item">
                                    <img src="images/calendar.svg">
                                    <span>15 Jan</span>
                                </li>
                            </ul>
                        </footer>
                    </article>
                </li>
            </ul>
        </main>
        <aside class="sidebar"></aside>
    </div>
</body>
</html>
